name: CI Handbook

on:
  push:
    branches: [main]        # FIX: lista con corchetes

jobs:
  validate:
    runs-on: ubuntu-latest  # FIX: nombre correcto del runner

    steps:
      - name: Checkout
        uses: actions/checkout@v5  # FIX: versión agregada

      - name: Validar estructura del repositorio
        run: |
          test -f README.md
          test -f 00-indice.md
          test -d ejercicios
          test -d soluciones

      - name: Mostrar SHA del commit
        run: 'echo "SHA: ${{ github.sha }}"'  # FIX: context correcto