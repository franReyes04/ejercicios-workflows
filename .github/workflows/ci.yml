name: CI Ecommerce

on:
  push:
    branches: [main]   # ERROR: falta formato correcto

jobs:
  test:
    runs-on: ubuntu-latest  # ERROR: nombre incorrecto del runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # ERROR: falta versión

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
        # FALTA: especificar node-version: '22'

      - name: Test backend
        run: npm test
        working-directory: ./backend
        # FALTA: working-directory para ./backend

      - name: Mostrar SHA del commit
        run: echo "SHA: ${{ github.sha }}"  # FALTA: usar el context correcto